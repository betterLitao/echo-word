<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Translation Icon</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 40px;
      height: 40px;
      overflow: hidden;
      background: transparent;
      cursor: pointer;
    }

    .icon-button {
      width: 36px;
      height: 36px;
      margin: 2px;
      border-radius: 50%;
      background: rgba(110, 231, 183, 0.95);
      border: 1px solid rgba(110, 231, 183, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px -8px rgba(110, 231, 183, 0.6);
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .icon-button:hover {
      transform: scale(1.1);
      background: rgb(110, 231, 183);
      box-shadow: 0 12px 32px -8px rgba(110, 231, 183, 0.8);
    }

    .icon-button svg {
      width: 18px;
      height: 18px;
      fill: #0f172a;
    }
  </style>
</head>
<body>
  <div class="icon-button" id="translateBtn">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
      <path d="M247.15,212.42l-56-112a8,8,0,0,0-14.31,0l-21.71,43.43A88,88,0,0,1,108,126.93,103.65,103.65,0,0,0,135.69,64H160a8,8,0,0,0,0-16H104V32a8,8,0,0,0-16,0V48H32a8,8,0,0,0,0,16h87.63A87.76,87.76,0,0,1,96,116.35a87.74,87.74,0,0,1-19-31,8,8,0,1,0-15.08,5.34A103.63,103.63,0,0,0,84,127a87.55,87.55,0,0,1-52,17,8,8,0,0,0,0,16,103.46,103.46,0,0,0,64-22.08,104.18,104.18,0,0,0,51.44,21.31l-26.6,53.19a8,8,0,0,0,14.31,7.16L148.94,192h70.11l13.79,27.58A8,8,0,0,0,240,224a8,8,0,0,0,7.15-11.58ZM156.94,176,184,121.89,211.05,176Z"/>
    </svg>
  </div>

  <script type="module">
    const { invoke } = window.__TAURI__.core;
    const { getCurrentWindow } = window.__TAURI__.window;

    const btn = document.getElementById('translateBtn');
    const currentWindow = getCurrentWindow();

    btn.addEventListener('click', async () => {
      try {
        // 触发翻译
        await invoke('trigger_global_selection_translate');
        // 隐藏图标窗口
        await currentWindow.hide();
      } catch (error) {
        console.error('Translation error:', error);
      }
    });

    // 3秒后自动隐藏
    setTimeout(async () => {
      await currentWindow.hide();
    }, 3000);
  </script>
</body>
</html>
